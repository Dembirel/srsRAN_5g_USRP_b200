# FDD band 3 config for running srsRAN Project gNB with srsUE using a USRP B200/B210.
# This config is based on the official srsUE-oriented sample, but uses a user-writable log path
# and the internal reference clock, which is the practical default for a plain B200 setup.

cu_cp:
  amf:
    addr: 10.53.1.2
    port: 38412
    bind_addr: 10.53.1.1
    supported_tracking_areas:
      - tac: 7
        plmn_list:
          - plmn: "00101"
            tai_slice_support_list:
              - sst: 1

ru_sdr:
  device_driver: uhd
  device_args: type=b200,serial=3289281,num_recv_frames=64,num_send_frames=64
  clock: internal
  srate: 5.76
  tx_gain: 60
  rx_gain: 40

cell_cfg:
  dl_arfcn: 368500
  band: 3
  channel_bandwidth_MHz: 5
  common_scs: 15
  plmn: "00101"
  tac: 7
  pdcch:
    dedicated:
      ss2_type: common
      dci_format_0_1_and_1_1: false
    common:
      ss0_index: 0
  prach:
    prach_config_index: 1
  pdsch:
    mcs_table: qam64
  pusch:
    mcs_table: qam64

log:
  filename: /home/dolaan/gnb_b200_srsue.log
  all_level: info

pcap:
  mac_enable: enable
  mac_filename: /home/dolaan/gnb_b200_mac.pcap
  ngap_enable: enable
  ngap_filename: /home/dolaan/gnb_b200_ngap.pcap
