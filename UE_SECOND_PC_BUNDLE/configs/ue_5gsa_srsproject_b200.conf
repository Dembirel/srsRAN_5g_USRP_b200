#####################################################################
# srsUE config for srsRAN Project gNB over USRP B200/B210
#####################################################################

[rf]
freq_offset = 0
tx_gain = 60
rx_gain = 40
srate = 5.76e6
nof_antennas = 1
device_name = uhd
device_args = type=b200,serial=343CF04,num_recv_frames=64,num_send_frames=64

[rat.eutra]
dl_earfcn = 2850
nof_carriers = 0

[rat.nr]
bands = 3
nof_carriers = 1
max_nof_prb = 25
nof_prb = 25

[pcap]
enable = nas
mac_filename = /home/dolaan/ue_b200_mac.pcap
mac_nr_filename = /home/dolaan/ue_b200_mac_nr.pcap
nas_filename = /home/dolaan/ue_b200_nas.pcap

[log]
all_level = info
phy_lib_level = none
all_hex_limit = 32
filename = /home/dolaan/ue_b200.log
file_max_size = -1

[usim]
mode = soft
algo = milenage
opc  = 63BFA50EE6523365FF14C1F45F88737D
k    = 00112233445566778899aabbccddeeff
imsi = 001010123456780
imei = 353490069873319

[rrc]
release = 15
ue_category = 4

[nas]
apn = srsapn
apn_protocol = ipv4

[gw]
netns = ue1
ip_devname = tun_srsue
ip_netmask = 255.255.255.0

[gui]
enable = false
